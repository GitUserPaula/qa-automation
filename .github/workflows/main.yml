name: Playwright Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Aseguramos que Playwright y sus dependencias de sistema estén listas
        python -m playwright install --with-deps chromium

    - name: Run Pytest
      run: |
        # Usamos el flag para ignorar asyncio y generamos reportes
        pytest -v -p no:asyncio --html=reporte.html --self-contained-html

    - name: Upload Test Artifacts
      if: always() # Se ejecuta aunque fallen los tests
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-and-evidence
        path: |
          reporte.html
          reporte.csv
          evidencias/
          